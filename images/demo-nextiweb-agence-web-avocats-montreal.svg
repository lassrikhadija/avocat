<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Beaumont Avocats — cabinet juridique à Montréal. Site démo NEXTIWEB Studio, modèle pour avocats.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F9F5EF"/>
      <stop offset="1" stop-color="#EFE7DA"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5E4126"/>
      <stop offset="0.55" stop-color="#8A6240"/>
      <stop offset="1" stop-color="#B89366"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- motifs doux -->
  <circle cx="1090" cy="80" r="260" fill="#EFE2D2" opacity="0.7"/>
  <circle cx="120" cy="600" r="220" fill="#9FC2DA" opacity="0.35"/>
  <rect x="28" y="28" width="1144" height="574" rx="28" fill="none" stroke="#E6DCCB" stroke-width="2"/>

  <!-- emblème balance de la justice -->
  <g transform="translate(905,250) scale(11)" fill="none" stroke="#8A6240" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
    <path d="M12 3v18M5 7h14M7 7l-3 7a4 4 0 0 0 6 0L7 7zm10 0l-3 7a4 4 0 0 0 6 0l-3-7zM8 21h8"/>
  </g>

  <!-- texte -->
  <text x="90" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="6" fill="#5E4126" font-weight="bold">CABINET JURIDIQUE · MONTRÉAL</text>
  <text x="86" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="110" fill="url(#title)" font-weight="bold">Beaumont Avocats</text>
  <text x="90" y="392" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#51463A" font-style="italic">Un avocat à vos côtés, en toute confiance.</text>

  <!-- pied : crédit démo -->
  <g transform="translate(90,520)">
    <rect x="0" y="0" width="14" height="14" rx="7" fill="#B89366"/>
    <text x="26" y="13" font-family="Georgia, serif" font-size="22" fill="#51463A">Site démo <tspan font-weight="bold" fill="#5E4126">NEXTIWEB Studio</tspan> — nextiweb.ca/avocats.html</text>
  </g>
</svg>
